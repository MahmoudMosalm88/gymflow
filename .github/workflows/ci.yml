name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  app-quality:
    name: app-quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Typecheck app
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Run unit and integration tests
        run: npm run test

  worker-typecheck:
    name: worker-typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/whatsapp-vm/package-lock.json

      - name: Install worker dependencies
        run: npm ci --prefix worker/whatsapp-vm

      - name: Typecheck worker
        run: npm run typecheck --prefix worker/whatsapp-vm

  smoke-local:
    name: smoke-local
    runs-on: ubuntu-latest
    needs:
      - app-quality

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app for smoke tests
        run: npm run build

      - name: Run local smoke tests
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run test:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
